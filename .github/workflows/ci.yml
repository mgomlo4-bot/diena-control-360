name: CI
run-name: CI web app - ${{ github.ref_name }} - ${{ github.sha }}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - neo/webapp-online-hardening
  workflow_dispatch:

jobs:
  verify:
    name: Verify Next.js web app
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/diena_control_360_ci
      NEXT_TELEMETRY_DISABLED: 1
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug workflow context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Ref name: $GITHUB_REF_NAME"
          echo "SHA: $GITHUB_SHA"
          echo "Node workflow file without npm cache enabled"
          test -f package.json && cat package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
